# banime40 — cấu hình build ZMK
# Bỏ dấu # để bật tính năng tương ứng.

# --- Không dây / nguồn ---
# Bật deep sleep để tiết kiệm pin khi không dùng (nRF52840)
CONFIG_ZMK_SLEEP=y
# Ngủ sau 15 phút không hoạt động (ms)
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# --- Bluetooth ---
# Ưu tiên xuất qua BLE khi có cả USB (mặc định của board không dây)
# CONFIG_ZMK_BLE=y   # đã bật mặc định trên nice_nano_v2

# --- USB logging (chỉ dùng khi debug, tắt khi dùng thật) ---
# CONFIG_ZMK_USB_LOGGING=y

# --- Tuỳ chọn khác ---
# CONFIG_ZMK_KEYBOARD_NAME="banime40"   # đặt trong Kconfig.defconfig
